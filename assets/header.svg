<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="240" viewBox="0 0 1200 240" fill="none">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a5d6ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#30363d" stroke-width="0.6" stroke-opacity="0.35"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="240" fill="#0d1117"/>
  <rect width="1200" height="240" fill="url(#grid)"/>
  <rect width="1200" height="240" fill="url(#halo)"/>

  <!-- Falling code glyphs -->
  <g opacity="0.10" font-family="'JetBrains Mono', monospace" font-size="12" fill="#58a6ff">
    <text x="70" y="-10">const<animate attributeName="y" from="-20" to="260" dur="8s" repeatCount="indefinite"/></text>
    <text x="180" y="-60">async<animate attributeName="y" from="-60" to="260" dur="6.4s" repeatCount="indefinite"/></text>
    <text x="300" y="-30">=&gt; ship<animate attributeName="y" from="-30" to="260" dur="9.2s" repeatCount="indefinite"/></text>
    <text x="440" y="-80">build()<animate attributeName="y" from="-80" to="260" dur="7s" repeatCount="indefinite"/></text>
    <text x="560" y="-20">0x1F<animate attributeName="y" from="-20" to="260" dur="8.6s" repeatCount="indefinite"/></text>
    <text x="690" y="-70">await<animate attributeName="y" from="-70" to="260" dur="9.5s" repeatCount="indefinite"/></text>
    <text x="820" y="-40">deploy<animate attributeName="y" from="-40" to="260" dur="6.8s" repeatCount="indefinite"/></text>
    <text x="950" y="-100">git push<animate attributeName="y" from="-100" to="260" dur="8.2s" repeatCount="indefinite"/></text>
    <text x="1090" y="-35">npm run<animate attributeName="y" from="-35" to="260" dur="7.3s" repeatCount="indefinite"/></text>
  </g>

  <!-- Floating particles -->
  <g opacity="0.5">
    <circle cx="150" cy="60" r="1.6" fill="#58a6ff"><animate attributeName="cy" values="60;190;60" dur="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0" dur="12s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="90" r="2" fill="#a5d6ff"><animate attributeName="cy" values="90;210;90" dur="14s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="14s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="180" r="1.3" fill="#58a6ff"><animate attributeName="cy" values="180;30;180" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="70" r="1.8" fill="#a5d6ff"><animate attributeName="cy" values="70;200;70" dur="13s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="13s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Name -->
  <text x="600" y="98" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="54" font-weight="800" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="6">RISHABH SETHIA</text>

  <!-- Terminal subtitle -->
  <text x="600" y="140" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14.5" letter-spacing="1.5">
    <tspan fill="#58a6ff">~/dev</tspan> <tspan fill="#6e7681">$</tspan> <tspan fill="#8b949e">whoami</tspan> <tspan fill="#6e7681">--</tspan><tspan fill="#8b949e">role</tspan> <tspan fill="#3fb950">"full-stack &amp; ai/ml engineer"</tspan>
  </text>
  <rect x="853" y="129" width="8" height="15" fill="#58a6ff"><animate attributeName="opacity" values="1;1;0;0" dur="1.15s" repeatCount="indefinite"/></rect>

  <!-- Status pills -->
  <g font-family="'JetBrains Mono','Courier New',monospace" font-size="11.5" letter-spacing="1" fill="#8b949e">
    <g transform="translate(438,170)">
      <rect x="-14" y="-13" width="118" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <circle cx="4" cy="0" r="3.5" fill="#3fb950" filter="url(#softGlow)"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
      <text x="16" y="4">BUILDING</text>
    </g>
    <g transform="translate(566,170)">
      <rect x="-14" y="-13" width="118" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <circle cx="4" cy="0" r="3.5" fill="#3fb950" filter="url(#softGlow)"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
      <text x="16" y="4">SHIPPING</text>
    </g>
    <g transform="translate(694,170)">
      <rect x="-14" y="-13" width="112" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <circle cx="4" cy="0" r="3.5" fill="#3fb950" filter="url(#softGlow)"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
      <text x="16" y="4">SCALING</text>
    </g>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="238" width="1200" height="2" fill="url(#lineGrad)" opacity="0.6"/>
</svg>
